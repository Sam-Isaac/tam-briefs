<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAM Brief — Arthy Mohanraj — Mon, 20 Jul 2026</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e1117;
  --surface: #161b27;
  --surface2: #1e2537;
  --border: #2a3148;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #3b82f6;
  --accent-dim: #1d4ed8;
  --red: #ef4444;
  --red-bg: #1a0a0a;
  --red-border: #7f1d1d;
  --blue: #60a5fa;
  --blue-bg: #0a0e1a;
  --blue-border: #1e3a5f;
  --amber: #f59e0b;
  --green: #22c55e;
  --purple: #a855f7;
  --risk-bg: #1a1200;
  --risk-border: #78350f;
  --risk-text: #fbbf24;
  --gong-bg: #0a1628;
  --gong-border: #1e3a5f;
  --tab-active: #3b82f6;
  --pill-p1: #ef4444;
  --pill-p2: #f97316;
  --pill-p3: #eab308;
  --pill-p4: #22c55e;
}

[data-theme="light"] {
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --border: #e2e8f0;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --accent: #2563eb;
  --red-bg: #fff5f5;
  --red-border: #fecaca;
  --blue-bg: #eff6ff;
  --blue-border: #bfdbfe;
  --risk-bg: #fffbeb;
  --risk-border: #fde68a;
  --risk-text: #92400e;
  --gong-bg: #eff6ff;
  --gong-border: #bfdbfe;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--accent); letter-spacing: -0.5px; }
.tam-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
.date-badge { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 3px 8px; border-radius: 4px; }
.theme-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: 'DM Mono', monospace; }
.theme-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Stats bar ── */
.stats-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-family: 'DM Mono', monospace; }
.stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
.stat-value.red { color: var(--red); }
.stat-value.blue { color: var(--blue); }
.stat-value.accent { color: var(--accent); }

/* ── Main layout ── */
.main { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn {
  font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 8px 16px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text2);
  cursor: pointer; transition: all 0.15s;
}
.tab-btn:hover { border-color: var(--accent); color: var(--text); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Section card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
}
.card-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
}
.card-head h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; }
.card-body { padding: 16px; }

/* ── Opener ── */
.opener-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 16px;
  font-style: italic;
  color: var(--text2);
  font-size: 13px;
}
.opener-label { font-style: normal; font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--text3); letter-spacing: 0.8px; margin-bottom: 6px; }

/* ── Gong block ── */
.gong-block {
  background: var(--gong-bg);
  border: 1px solid var(--gong-border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 16px;
}
.gong-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.gong-icon { font-size: 16px; }
.gong-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: var(--blue); }
.gong-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.gong-link { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); text-decoration: none; margin-left: auto; }
.gong-link:hover { text-decoration: underline; }
.gong-items { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.gong-items li { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; color: var(--text); }
.gong-items li::before { content: "→"; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
.owner-tag { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--text3); padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }

/* ── Tables ── */
.section-label {
  font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text3); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.red { background: var(--red); }
.dot.blue { background: var(--blue); }

.case-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 16px; }
.case-table th {
  text-align: left; font-family: 'DM Mono', monospace; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3);
  padding: 6px 10px; border-bottom: 1px solid var(--border);
}
.case-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.case-table tr:last-child td { border-bottom: none; }
.case-table tr:hover td { background: var(--surface2); }
.case-table.on-us { border-left: 3px solid var(--red); }
.case-table.on-customer { border-left: 3px solid var(--blue); }

.case-link { color: var(--accent); text-decoration: none; font-family: 'DM Mono', monospace; font-size: 11px; }
.case-link:hover { text-decoration: underline; }

.pill {
  display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px;
  padding: 2px 7px; border-radius: 10px; font-weight: 500;
}
.pill.p1 { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.pill.p2 { background: rgba(249,115,22,0.15); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
.pill.p3 { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
.pill.p4 { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }

.days-cell { font-family: 'DM Mono', monospace; font-size: 11px; }
.days-red { color: var(--red); font-weight: 600; }
.days-amber { color: var(--amber); }

/* ── Risk box ── */
.risk-box {
  background: var(--risk-bg);
  border: 1px solid var(--risk-border);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex; gap: 10px; align-items: flex-start;
  margin-bottom: 16px;
}
.risk-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.risk-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--risk-text); margin-bottom: 4px; }
.risk-text { font-size: 13px; color: var(--text); }

/* ── Jira tickets ── */
.jira-list { display: flex; flex-direction: column; gap: 8px; }
.jira-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 6px;
  background: var(--surface2); border: 1px solid var(--border);
}
.jira-key { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); text-decoration: none; flex-shrink: 0; }
.jira-key:hover { text-decoration: underline; }
.jira-summary { font-size: 12px; color: var(--text); flex: 1; }
.jira-status { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); background: var(--bg); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 48px 24px;
  color: var(--text3); font-family: 'DM Mono', monospace;
}
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-title { font-size: 16px; color: var(--text2); margin-bottom: 8px; }
.empty-sub { font-size: 12px; }

/* ── Filtered calls notice ── */
.filtered-notice {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--amber);
  border-radius: 8px;
  padding: 12px 16px;
  margin-top: 16px;
  font-size: 12px;
}
.filtered-notice strong { color: var(--amber); font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 6px; }
.filtered-notice ul { list-style: disc; padding-left: 16px; color: var(--text2); }
.filtered-notice li { margin-bottom: 3px; }

/* ── Call header ── */
.call-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
}
.customer-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; }
.call-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.call-time { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--accent-dim); color: #93c5fd; padding: 4px 10px; border-radius: 5px; }
.tenant-id { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); color: var(--text3); padding: 4px 10px; border-radius: 5px; }

/* ── Master grid ── */
.master-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.master-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  transition: border-color 0.15s;
}
.master-card:hover { border-color: var(--accent); }
.master-card.has-risk { border-left: 3px solid var(--red); }
.mc-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; margin-bottom: 4px; }
.mc-calls { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.mc-stats { display: flex; gap: 20px; margin-bottom: 12px; }
.mc-stat { display: flex; flex-direction: column; }
.mc-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); font-family: 'DM Mono', monospace; }
.mc-stat-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.mc-stat-val.red { color: var(--red); }
.mc-stat-val.blue { color: var(--blue); }
.mc-risk { font-size: 11px; color: var(--risk-text); background: var(--risk-bg); border: 1px solid var(--risk-border); border-radius: 6px; padding: 8px 10px; margin-top: 8px; }
.mc-link { display: inline-block; margin-top: 12px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); text-decoration: none; }
.mc-link:hover { text-decoration: underline; }

.page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; margin-bottom: 4px; }
.page-sub { color: var(--text2); font-size: 14px; margin-bottom: 24px; }

@media (max-width: 600px) {
  .stats-bar { gap: 16px; padding: 12px 16px; }
  .main { padding: 16px; }
  .case-table { display: block; overflow-x: auto; }
  .header { padding: 12px 16px; }
}
</style>
  
<script>
(function(){
  const saved = localStorage.getItem('ts-tam-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  window.toggleTheme = function(){
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('ts-tam-theme', next);
  };
})();
</script>

</head>
<body>
  <header class="header">
    <div class="header-left">
      <span class="logo">TS·TAM</span>
      <span style="color:var(--border)">|</span>
      <span class="tam-name">Arthy Mohanraj</span>
      <span class="date-badge">Mon, 20 Jul 2026</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="https://sam-isaac.github.io/tam-briefs/20Jul2026/Arthy_20Jul2026.html" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);text-decoration:none">🔗 Permalink</a>
      <button class="theme-btn" onclick="toggleTheme()">◐ Theme</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Calls Today</span>
      <span class="stat-value accent">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">SF Total</span>
      <span class="stat-value">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">On Us 🔴</span>
      <span class="stat-value red">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">On Customer 🔵</span>
      <span class="stat-value blue">0</span>
    </div>
  </div>

  <main class="main">
    
<div class="empty-state">
  <div class="empty-icon">☀️</div>
  <div class="empty-title">No customer calls today</div>
  <div class="empty-sub">Calendar shows no external customer meetings for Mon, 20 Jul 2026.</div>
</div>

  </main>

  
<script>
function showTab(tabId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
}
</script>

</body>
</html>
