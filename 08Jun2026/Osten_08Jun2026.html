<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osten Diniz — TAM Brief 08Jun2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#f5f4f0;--bg2:#eceae4;--bg3:#ffffff;--border:#ddd9d0;
--text:#1a1916;--text2:#6b6860;--text3:#9b9890;--red:#c94040;
--red-bg:#fdf0f0;--blue:#2563eb;--blue-bg:#eff4ff;--green:#16a34a;
--green-bg:#f0fdf4;--orange:#d97706;--orange-bg:#fffbeb;
--jira:#0052cc;--tag-bg:#e8e6e0;}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--bg2:#1a1917;
--bg3:#222220;--border:#2e2d2a;--text:#f0ede8;--text2:#8a8880;
--text3:#5a5855;--red:#ef5555;--red-bg:#1f1212;--blue:#60a5fa;
--blue-bg:#111827;--green:#4ade80;--green-bg:#0f1f14;--orange:#fbbf24;
--orange-bg:#1c1608;--jira:#4d9de0;--tag-bg:#2a2926;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
.header{padding:28px 32px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.eyebrow{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.02em;}
.title span{color:var(--text2);font-weight:400;}
.meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.pill{display:flex;align-items:center;gap:6px;background:var(--tag-bg);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;}
.dot{width:6px;height:6px;border-radius:50%;}.dr{background:var(--red);}.db{background:var(--blue);}
.stats{display:flex;gap:12px;padding:20px 32px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:100px;}
.snum{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;}
.snum.r{color:var(--red);}.snum.b{color:var(--blue);}.snum.o{color:var(--orange);}
.slabel{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.tabs{display:flex;padding:16px 32px 0;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;font-family:'DM Sans',sans-serif;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom:2px solid var(--text);font-weight:600;}
.cnt{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:10px;margin-left:6px;font-family:'DM Mono',monospace;}
.cnt.r{background:var(--red-bg);color:var(--red);}.cnt.b{background:var(--blue-bg);color:var(--blue);}
.content{padding:24px 32px;}
.panel{display:none;}.panel.active{display:block;}
.gong{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:10px;padding:16px 20px;margin-bottom:20px;}
.gong-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.gong-ttl{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.05em;}
.glink{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);text-decoration:none;margin-left:auto;}
.glink:hover{text-decoration:underline;}
.gi{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text);padding:2px 0;}
.ob{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap;}
.ou{background:var(--red-bg);color:var(--red);}.oc{background:var(--blue-bg);color:var(--blue);}
.sh{display:flex;align-items:center;gap:10px;margin:20px 0 12px;}
.sl{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.sl.r{color:var(--red);}.sl.b{color:var(--blue);}.sl.j{color:var(--jira);}
.sc{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:99px;}
.sc.r{background:var(--red-bg);color:var(--red);}.sc.b{background:var(--blue-bg);color:var(--blue);}.sc.j{background:var(--blue-bg);color:var(--jira);}
.tw{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg2);border-bottom:1px solid var(--border);}
th{padding:10px 14px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
td{padding:11px 14px;color:var(--text);vertical-align:top;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}
.tid{font-family:'DM Mono',monospace;font-size:12px;color:var(--blue);text-decoration:none;white-space:nowrap;}
.tid:hover{text-decoration:underline;}
.sb{font-size:11px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:4px;white-space:nowrap;display:inline-block;}
.su{background:var(--red-bg);color:var(--red);}.scu{background:var(--blue-bg);color:var(--blue);}
.so{background:var(--orange-bg);color:var(--orange);}.sp{background:var(--blue-bg);color:var(--blue);}
.pb{font-size:10px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px;white-space:nowrap;}
.p1{background:#fde8e8;color:#b91c1c;}.p2{background:var(--orange-bg);color:var(--orange);}.p3{background:var(--blue-bg);color:var(--blue);}
.jb{font-family:'DM Mono',monospace;font-size:11px;color:var(--jira);text-decoration:none;background:var(--blue-bg);padding:2px 7px;border-radius:4px;white-space:nowrap;}
.jb:hover{text-decoration:underline;}
.db2{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}.db2.old{color:var(--red);}
.st{color:var(--text2);font-size:12px;line-height:1.5;max-width:280px;}
.opener{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:10px;padding:14px 18px;margin-top:20px;display:flex;gap:12px;}
.ol{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;margin-top:2px;}
.ot{font-size:13px;color:var(--text);font-style:italic;line-height:1.6;}
.risk{background:var(--red-bg);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:10px;padding:12px 16px;margin-top:12px;display:flex;gap:10px;align-items:center;}
.rl{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.rt{font-size:13px;color:var(--text);}
.note{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="eyebrow">Testsigma · TAM Daily Brief</div>
    <div class="title">Osten Diniz <span>/ Monday, 8 Jun 2026</span></div>
    <div class="meta">
      <div class="pill"><span class="dot dr"></span>4 calls today</div>
      <div class="pill"><span class="dot dr"></span>5 on Us</div>
      <div class="pill"><span class="dot db"></span>2 on Customer</div>
    </div>
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="snum">7</div><div class="slabel">Total Open</div></div>
  <div class="stat"><div class="snum r">5</div><div class="slabel">On Us</div></div>
  <div class="stat"><div class="snum b">2</div><div class="slabel">On Customer</div></div>
  <div class="stat"><div class="snum o">4</div><div class="slabel">Calls Today</div></div>
  <div class="stat"><div class="snum r">137d</div><div class="slabel">Oldest Ticket</div></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>
<script>
const customers = [{"name":"Spacewell","callTime":"3:00 PM","tenantId":null,"onUs":3,"onCustomer":2,"gong":{"date":"28 May 2026","link":"https://app.gong.io/call?id=1631331819780284415","items":[{"text":"Pull backend logs for accessibility report stuck in loading since February and investigate generation time issue","owner":"US"},{"text":"Build custom report script showing pass/fail summary + critical test case status per Arun's email requirements","owner":"US"},{"text":"Share ETA on auto-heal fix — Spacewell running regression with auto-heal DISABLED, PI starts Jun 12","owner":"US"},{"text":"Send email with custom report field requirements to TAM team","owner":"CUSTOMER"}]},"waitingOnUs":[{"id":"00060691","sfLink":"https://testsigma.lightning.force.com/lightning/r/Case/500OX00000z692LYAQ/view","lastResponse":"Auto-heal at step 42.6 heals to unrelated element when target button absent; customer has disabled auto-heal globally","reporter":"Shyam Jeedi","jira":"TP-4679","days":17,"priority":"P2"},{"id":"00060587","sfLink":"https://testsigma.lightning.force.com/lightning/r/Case/500OX00000yzfrhYAA/view","lastResponse":"Auto-heal incorrectly enters while-loop by healing to wrong element, causing false test failures during regression","reporter":"Shyam Jeedi","jira":"TP-3788","days":19,"priority":"P2"},{"id":"00060598","sfLink":"https://testsigma.lightning.force.com/lightning/r/Case/500OX00000yzf8fYAA/view","lastResponse":"iOS recorder page becomes unresponsive when clicking date picker element in elements page mirroring mode","reporter":"Shyam Jeedi","jira":"TP-4692","days":19,"priority":"P2"}],"waitingOnCustomer":[{"id":"00060823","sfLink":"https://testsigma.lightning.force.com/lightning/r/Case/500OX00000zL2DUYA0/view","lastResponse":"Customer selected WCAG 2.2 AA but report includes all WCAG versions; awaiting customer confirmation after fix","reporter":"Shyam Jeedi","jira":"TP-4769","days":11,"priority":"P2"},{"id":"00059655","sfLink":"https://testsigma.lightning.force.com/lightning/r/Case/500OX00000xrERSYA2/view","lastResponse":"Copilot not working as expected; awaiting additional details from customer to investigate","reporter":"Shyam Jeedi","jira":null,"days":46,"priority":"P2"}],"jiraTickets":[{"id":"TP-3788","summary":"Auto-Heal Interacting with Incorrect Element Instead of Throwing Element Not Found Error","status":"Open","lastComment":"Engineering investigating root cause of auto-heal incorrectly evaluating visibility conditions in while-loops","reporter":"Automation for Jira","assignee":"Divya Jakkampudi","priority":"P2","days":55},{"id":"TP-4679","summary":"Autoheal selecting different locator unrelated to actual element at step 42.6","status":"Open","lastComment":"Assigned to engineering; Spacewell has disabled auto-heal as workaround pending fix","reporter":"Indu Shekar M","assignee":"Rahul Mohan","priority":"P2","days":13}],"biggestRisk":"00060587 / TP-3788 — Auto-heal is Spacewell's core buying reason; running PI regression with it DISABLED; Jun 12 is the deadline — escalate ETA immediately","opener":"Hi Arun and team! Key item first — I know PI regression starts June 12th. I want to walk through where we are on the auto-heal issues and what our commit date looks like before anything else."},{"name":"MPower","callTime":"4:00 PM","tenantId":null,"onUs":0,"onCustomer":0,"gong":null,"waitingOnUs":[],"waitingOnCustomer":[],"jiraTickets":[],"biggestRisk":"No open cases — training session today; capture any blockers or feature gaps raised during the session","opener":"Hi MPower team! Great to have you all in today's training. Let's make sure everyone leaves with clarity on the flows we cover — feel free to flag any questions as we go."},{"name":"Acuity Analytics","callTime":"6:00 PM","tenantId":null,"onUs":0,"onCustomer":0,"gong":null,"waitingOnUs":[],"waitingOnCustomer":[],"jiraTickets":[],"biggestRisk":"No open cases — early-stage customer (intro/demo phase); focus today on use-case alignment and adoption velocity","opener":"Hi Kriti! Picking up from our last session — today let's walk through your specific use case and see how we map Testsigma to your testing workflows."},{"name":"PolicyMe","callTime":"9:30 PM","tenantId":null,"onUs":2,"onCustomer":0,"gong":null,"waitingOnUs":[{"id":"00061084","sfLink":"https://testsigma.lightning.force.com/lightning/r/Case/500OX00000zm5FDYAY/view","lastResponse":"Customer requesting guidance on converting UNIX timestamp to DD/MM/YYYY format within test steps","reporter":"PolicyMe Team","jira":null,"days":4,"priority":"P2"},{"id":"00055006","sfLink":"https://testsigma.lightning.force.com/lightning/r/Case/500OX00000uMwpwYAC/view","lastResponse":"PolicyMe requested Apple Pay and Google Pay test scenario creation; pending internal development of mobile payment automation","reporter":"Alwin (PolicyMe)","jira":null,"days":137,"priority":"P2"}],"waitingOnCustomer":[],"jiraTickets":[],"biggestRisk":"00055006 — 137 days old, Pending Internal; Apple/Google Pay scenario blocking PolicyMe's payment flow coverage — needs immediate internal escalation","opener":"Good evening! Excited about the TMS demo today. Before we dive in — I want to quickly address the two open support items, particularly the Apple Pay/Google Pay scenario that has been pending for a while."}];
function render(){
  const tabs=document.getElementById('tabs');
  const content=document.getElementById('content');
  customers.forEach((c,i)=>{
    const t=document.createElement('button');
    t.className='tab'+(i===0?' active':'');
    t.onclick=()=>sw(i);
    t.innerHTML=c.name+' <span class="cnt '+(c.onUs>0?'r':'b')+'">'+(c.onUs+c.onCustomer)+'</span>';
    tabs.appendChild(t);
    const p=document.createElement('div');
    p.className='panel'+(i===0?' active':'');
    p.id='p'+i;
    p.innerHTML=buildPanel(c);
    content.appendChild(p);
  });
}
function sw(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',i===j));
}
function buildPanel(c){
  let h='';
  if(c.gong){
    h+=`<div class="gong"><div class="gong-hdr"><div class="gong-ttl">📞 Gong — Pending · ${c.gong.date}</div><a class="glink" href="${c.gong.link}">🔗 View recording →</a></div>${c.gong.items.map(i=>`<div class="gi">• ${i.text} <span class="ob ${i.owner==='US'?'ou':'oc'}">${i.owner}</span></div>`).join('')}</div>`;
  }
  if(c.waitingOnUs.length){
    h+=`<div class="sh"><div class="sl r">🔴 Waiting on Us</div><div class="sc r">${c.waitingOnUs.length} cases</div></div><div class="tw"><table><thead><tr><th>Ticket ID</th><th>Last Response</th><th>Reporter</th><th>Linked Jira</th><th>Days Open</th><th>Priority</th><th>Status</th></tr></thead><tbody>${c.waitingOnUs.map(t=>`<tr><td><a class="tid" href="${t.sfLink}">${t.id}</a></td><td><div class="st">${t.lastResponse}</div></td><td style="font-size:12px;white-space:nowrap;">${t.reporter}</td><td>${t.jira?`<a class="jb" href="https://testsigma.atlassian.net/browse/${t.jira}">${t.jira}</a>`:'—'}</td><td><span class="db2${t.days>30?' old':''}">${t.days}d</span></td><td><span class="pb p${t.priority.replace('P','')}">${t.priority}</span></td><td><span class="sb su">On Us</span></td></tr>`).join('')}</tbody></table></div>`;
  }
  if(c.waitingOnCustomer.length){
    h+=`<div class="sh"><div class="sl b">🔵 Waiting on Customer</div><div class="sc b">${c.waitingOnCustomer.length} cases</div></div><div class="tw"><table><thead><tr><th>Ticket ID</th><th>Last Response</th><th>Reporter</th><th>Linked Jira</th><th>Days Open</th><th>Priority</th><th>Status</th></tr></thead><tbody>${c.waitingOnCustomer.map(t=>`<tr><td><a class="tid" href="${t.sfLink}">${t.id}</a></td><td><div class="st">${t.lastResponse}</div></td><td style="font-size:12px;white-space:nowrap;">${t.reporter}</td><td>${t.jira?`<a class="jb" href="https://testsigma.atlassian.net/browse/${t.jira}">${t.jira}</a>`:'—'}</td><td><span class="db2${t.days>30?' old':''}">${t.days}d</span></td><td><span class="pb p${t.priority.replace('P','')}">${t.priority}</span></td><td><span class="sb scu">On Customer</span></td></tr>`).join('')}</tbody></table></div>`;
  }
  if(c.jiraTickets&&c.jiraTickets.length){
    h+=`<div class="sh"><div class="sl j">🎫 Jira Tickets</div><div class="sc j">${c.jiraTickets.length} tickets</div></div><div class="tw"><table><thead><tr><th>Ticket ID</th><th>Summary</th><th>Status</th><th>Last Comment</th><th>Reporter</th><th>Assignee</th><th>Priority</th><th>Days Open</th></tr></thead><tbody>${c.jiraTickets.map(t=>`<tr><td><a class="tid" href="https://testsigma.atlassian.net/browse/${t.id}">${t.id}</a></td><td><div class="st">${t.summary}</div></td><td><span class="sb sp">${t.status}</span></td><td><div class="st">${t.lastComment}</div></td><td style="font-size:12px;">${t.reporter}</td><td style="font-size:12px;">${t.assignee}</td><td><span class="pb p${t.priority.replace('P','')}">${t.priority}</span></td><td><span class="db2${t.days>30?' old':''}">${t.days}d</span></td></tr>`).join('')}</tbody></table></div>`;
  }
  if(!c.waitingOnUs.length&&!c.waitingOnCustomer.length){
    h+=`<div style="padding:40px 0;text-align:center;color:var(--text3);font-family:'DM Mono',monospace;font-size:13px;">✓ No open support cases</div>`;
  }
  h+=`<div class="risk"><div class="rl">🚨 Biggest Risk</div><div class="rt">${c.biggestRisk}</div></div>`;
  h+=`<div class="opener"><div class="ol">🗣️ Open with</div><div class="ot">"${c.opener}"</div></div>`;
  h+=`<div class="note">📌 If any customer call is missing, ensure the calendar event has "Tenant ID: XXXXX" in the description or the customer company name in the event title.</div>`;
  return h;
}
render();
</script>
</body>
</html>
