<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arthy Mohanraj — TAM Brief · 22 Jun 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f4fb;--sf:#fff;--sf2:#eef0f9;--bd:#dde0ee;
  --tx:#1b1e2f;--tx2:#575d7d;--tx3:#9298b5;
  --ac:#4f52d8;--acs:#ecedff;
  --red:#dc2626;--reds:#fef2f2;--blue:#2563eb;--blues:#eff6ff;
  --amb:#d97706;--ambs:#fffbeb;
  --p1c:#dc2626;--p1b:#fef2f2;
  --p2c:#d97706;--p2b:#fffbeb;
  --p3c:#7c3aed;--p3b:#f5f3ff;
  --phc:#be123c;--phb:#fff1f2;
  --r:10px;--rs:6px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0b0d18;--sf:#15172a;--sf2:#1c1f32;--bd:#252840;
    --tx:#e3e6f5;--tx2:#888eb0;--tx3:#585e80;
    --ac:#818cf8;--acs:#1d1f40;
    --red:#f87171;--reds:#2a1515;--blue:#60a5fa;--blues:#142035;
    --amb:#fbbf24;--ambs:#2a1f0a;
    --p1c:#f87171;--p1b:#2a1515;
    --p2c:#fbbf24;--p2b:#2a1f0a;
    --p3c:#a78bfa;--p3b:#1e1535;
    --phc:#fb7185;--phb:#2a1020;
  }
}
*,*::before,*::after{box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);margin:0;padding:0;min-height:100vh}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:15px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--ac);letter-spacing:-0.3px}
.hdiv{width:1px;height:20px;background:var(--bd)}
.htitle{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--tx)}
.hdate{font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);margin-left:auto}
.stats{padding:16px 28px;display:flex;gap:12px;flex-wrap:wrap}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 18px;min-width:130px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);margin-bottom:5px}
.sv{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;line-height:1}
.sv.red{color:var(--red)}.sv.blue{color:var(--blue)}
.rc{background:var(--sf);border:1px solid var(--bd);border-left:4px solid var(--red);border-radius:var(--r);padding:12px 18px;flex:1;min-width:260px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.rc .sl{color:var(--red)}
.rt{font-size:13px;color:var(--tx);line-height:1.5;margin-top:3px}
.ooo{margin:0 28px 14px;background:var(--ambs);border:1px solid var(--amb);border-radius:var(--r);padding:13px 17px;display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--tx)}
.opener{margin:0 28px 14px;background:var(--acs);border:1px solid var(--ac);border-radius:var(--r);padding:12px 16px}
.opener-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ac);margin-bottom:5px}
.opener-txt{font-size:13px;color:var(--tx);line-height:1.5}
.tabs-wrap{padding:0 28px 28px}
.tabs-nav{display:flex;gap:3px;border-bottom:2px solid var(--bd);margin-bottom:18px;overflow-x:auto}
.tb{padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--tx2);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;border-radius:6px 6px 0 0;transition:all .12s}
.tb:hover{color:var(--ac);background:var(--acs)}
.tb.active{color:var(--ac);border-bottom-color:var(--ac);background:var(--acs)}
.tp{display:none}.tp.active{display:block}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:820px){.cg{grid-template-columns:1fr}}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.05);overflow:hidden}
.ch{padding:11px 15px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);background:var(--sf2)}
.ci{font-size:14px;flex-shrink:0}
.ct{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2)}
.cm{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3)}
.cb{padding:13px 15px}
.ir{display:flex;align-items:baseline;gap:9px;padding:6px 0;border-bottom:1px solid var(--bd)}
.ir:last-child{border-bottom:none}
.il{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--tx3);width:72px;flex-shrink:0}
.iv{font-size:13px;font-weight:500;color:var(--tx)}
.al{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:7px}
.ai{display:flex;gap:8px;align-items:flex-start;font-size:12px;line-height:1.45;color:var(--tx)}
.ob{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.ob-us{background:var(--reds);color:var(--red)}
.ob-cu{background:var(--blues);color:var(--blue)}
.sfc{grid-column:1/-1}
.bkt{display:flex;align-items:center;gap:8px;margin-bottom:9px;margin-top:4px}
.bkt:first-child{margin-top:0}
.bb{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.bb-us{background:var(--reds);color:var(--red)}
.bb-cu{background:var(--blues);color:var(--blue)}
.bn{font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3)}
.cs-sec{margin-bottom:14px}
.cs-sec:last-child{margin-bottom:0}
table.ct{width:100%;border-collapse:collapse;font-size:12px}
table.ct th{text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);padding:0 8px 7px 0;border-bottom:1px solid var(--bd)}
table.ct td{padding:7px 8px 7px 0;border-bottom:1px solid var(--bd);vertical-align:top;color:var(--tx)}
table.ct tr:last-child td{border-bottom:none}
.cid{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);white-space:nowrap}
.csub{font-size:12px;line-height:1.35;color:var(--tx)}
.cmeta{font-size:11px;color:var(--tx2);margin-top:2px}
.pb{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 5px;border-radius:3px;white-space:nowrap}
.ph{background:var(--phb);color:var(--phc)}
.p1{background:var(--p1b);color:var(--p1c)}
.p2{background:var(--p2b);color:var(--p2c)}
.p3{background:var(--p3b);color:var(--p3c)}
.ag{font-family:'DM Mono',monospace;font-size:11px;padding:1px 5px;border-radius:3px;white-space:nowrap}
.ag-r{background:var(--p1b);color:var(--p1c);font-weight:700}
.ag-w{background:var(--p2b);color:var(--p2c)}
.ag-n{color:var(--tx3)}
.jl{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);text-decoration:none;background:var(--blues);padding:1px 5px;border-radius:3px;margin-left:4px;display:inline-block}
.jl:hover{text-decoration:underline}
.ni{font-size:12px;color:var(--tx3);font-style:italic;padding:5px 0;margin:0}
.no-calls{padding:40px 28px;text-align:center;color:var(--tx3);font-size:14px}
.ftr{margin-top:32px;padding:14px 28px;border-top:1px solid var(--bd);font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);display:flex;gap:16px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="hdr">
  <span class="logo">Testsigma</span>
  <div class="hdiv"></div>
  <span class="htitle" id="htitle">Daily Brief</span>
  <span class="hdate">22 Jun 2026 · TAM Briefing Bot</span>
</div>
<div id="root"></div>
<div class="ftr">
  <span>TAM Briefing Bot · 22 Jun 2026</span>
  <span>Sources: Salesforce · Gong · Jira · Google Calendar</span>
  <span>Salesforce = source of truth for case bucketing</span>
</div>
<script>
const CUSTOMERS=[{"name": "PTSG (Internal Prep)", "callTime": "12:30 IST", "callPurpose": "Demo Preparation (Internal)", "gong": {"lastCall": null, "actionItems": []}, "sf": {"onUs": [], "onCustomer": []}}];
const TAM_NAME="Arthy Mohanraj";
const TAM_OPENER="1 internal prep/demo check for PTSG at 12:30 IST. No open customer cases on file. Clean slate!";
const BIGGEST_RISK="No open customer support cases today \u2014 internal prep call only";
const OOO=false;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pb(p){
  if(!p)return'';
  const l=String(p).toLowerCase();
  if(l.includes('highest'))return`<span class="pb ph">Highest</span>`;
  if(l.includes('p1')||l.includes('critical'))return`<span class="pb p1">P1</span>`;
  if(l.includes('p2')||l.includes('high'))return`<span class="pb p2">P2</span>`;
  return`<span class="pb p3">P3</span>`;
}
function agb(a){
  if(a>=30)return`<span class="ag ag-r">${a}d</span>`;
  if(a>=14)return`<span class="ag ag-w">${a}d</span>`;
  return`<span class="ag ag-n">${a}d</span>`;
}
function caseRow(c){
  const jls=(c.jira||[]).map(k=>`<a class="jl" href="https://testsigma.atlassian.net/browse/${k}" target="_blank">${k}</a>`).join('');
  return`<tr>
    <td><span class="cid">${esc(c.id)}</span></td>
    <td><div class="csub">${esc(c.subject)}${jls}</div><div class="cmeta">${esc(c.owner)} · ${esc(c.status)}</div></td>
    <td>${pb(c.priority)}</td>
    <td>${agb(c.age)}</td>
  </tr>`;
}
function caseTable(cases){
  if(!cases||!cases.length)return'<p class="ni">None</p>';
  return`<table class="ct"><thead><tr><th>Case #</th><th>Subject / Owner</th><th>Pri</th><th>Age</th></tr></thead><tbody>${cases.map(caseRow).join('')}</tbody></table>`;
}
function buildPanel(c){
  const ai=(c.gong&&c.gong.actionItems)||[];
  const onUs=(c.sf&&c.sf.onUs)||[];
  const onCu=(c.sf&&c.sf.onCustomer)||[];
  const lc=c.gong&&c.gong.lastCall;
  const aiHtml=ai.length
    ?`<ul class="al">${ai.map(a=>`<li class="ai"><span class="ob ${a.owner==='US'?'ob-us':'ob-cu'}">${a.owner==='US'?'Us':'Cust'}</span><span>${esc(a.text)}</span></li>`).join('')}</ul>`
    :'<p class="ni">No pending action items recorded</p>';
  return`<div class="cg">
    <div class="card">
      <div class="ch"><span class="ci">📅</span><span class="ct">Call Info</span></div>
      <div class="cb">
        <div class="ir"><span class="il">Time</span><span class="iv">${esc(c.callTime)}</span></div>
        <div class="ir"><span class="il">Purpose</span><span class="iv">${esc(c.callPurpose)}</span></div>
        ${lc?`<div class="ir"><span class="il">Last Gong</span><span class="iv">${esc(lc)}</span></div>`:''}
      </div>
    </div>
    <div class="card">
      <div class="ch"><span class="ci">🎙</span><span class="ct">Gong Action Items</span><span class="cm">${ai.length} item${ai.length!==1?'s':''}</span></div>
      <div class="cb">${aiHtml}</div>
    </div>
    <div class="card sfc">
      <div class="ch"><span class="ci">☁️</span><span class="ct">Salesforce Cases</span><span class="cm">${onUs.length} on us · ${onCu.length} on customer</span></div>
      <div class="cb">
        <div class="cs-sec">
          <div class="bkt"><span class="bb bb-us">🔴 Waiting on Us</span><span class="bn">${onUs.length} case${onUs.length!==1?'s':''}</span></div>
          ${caseTable(onUs)}
        </div>
        <div class="cs-sec">
          <div class="bkt"><span class="bb bb-cu">🔵 Waiting on Customer</span><span class="bn">${onCu.length} case${onCu.length!==1?'s':''}</span></div>
          ${caseTable(onCu)}
        </div>
      </div>
    </div>
  </div>`;
}
function render(){
  document.getElementById('htitle').textContent=TAM_NAME+' — Daily Brief';
  const root=document.getElementById('root');
  const totUs=CUSTOMERS.reduce((s,c)=>s+((c.sf&&c.sf.onUs&&c.sf.onUs.length)||0),0);
  const totCu=CUSTOMERS.reduce((s,c)=>s+((c.sf&&c.sf.onCustomer&&c.sf.onCustomer.length)||0),0);
  const statsHtml=`<div class="stats">
    <div class="sc"><div class="sl">Calls Today</div><div class="sv">${CUSTOMERS.length}</div></div>
    <div class="sc"><div class="sl">On Us</div><div class="sv red">${totUs}</div></div>
    <div class="sc"><div class="sl">On Customer</div><div class="sv blue">${totCu}</div></div>
    <div class="rc"><div class="sl">⚡ Biggest Risk</div><div class="rt">${esc(BIGGEST_RISK)}</div></div>
  </div>`;
  const oooHtml=OOO?`<div class="ooo">🏖&nbsp;<div><strong style="color:var(--amb)">Out of Office</strong> — No customer calls today. OOO until 29 Jun 2026. No action required.</div></div>`:'';
  const openerHtml=TAM_OPENER?`<div class="opener"><div class="opener-lbl">💬 Suggested Opener</div><div class="opener-txt">${esc(TAM_OPENER)}</div></div>`:'';
  if(!CUSTOMERS.length){
    root.innerHTML=statsHtml+oooHtml+openerHtml+'<div class="no-calls">No customer calls scheduled for today.</div>';
    return;
  }
  const nav=CUSTOMERS.map((c,i)=>`<button class="tb${i===0?' active':''}" onclick="sw(${i})">${esc(c.name)}</button>`).join('');
  const panels=CUSTOMERS.map((c,i)=>`<div class="tp${i===0?' active':''}" id="tp${i}">${buildPanel(c)}</div>`).join('');
  root.innerHTML=statsHtml+oooHtml+openerHtml+`<div class="tabs-wrap"><nav class="tabs-nav">${nav}</nav>${panels}</div>`;
}
function sw(i){
  document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('active',i===j));
  document.querySelectorAll('.tp').forEach((p,j)=>p.classList.toggle('active',i===j));
}
render();
</script>
</body>
</html>
