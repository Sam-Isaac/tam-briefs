<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osten Diniz — TAM Brief Monday, 14 Jul 2026</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#f5f4f0;--bg2:#eceae4;--bg3:#ffffff;--border:#ddd9d0;
--text:#1a1916;--text2:#6b6860;--text3:#9b9890;--red:#c94040;
--red-bg:#fdf0f0;--blue:#2563eb;--blue-bg:#eff4ff;--green:#16a34a;
--green-bg:#f0fdf4;--orange:#d97706;--orange-bg:#fffbeb;
--jira:#0052cc;--tag-bg:#e8e6e0;}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--bg2:#1a1917;
--bg3:#222220;--border:#2e2d2a;--text:#f0ede8;--text2:#8a8880;
--text3:#5a5855;--red:#ef5555;--red-bg:#1f1212;--blue:#60a5fa;
--blue-bg:#111827;--green:#4ade80;--green-bg:#0f1f14;--orange:#fbbf24;
--orange-bg:#1c1608;--jira:#4d9de0;--tag-bg:#2a2926;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
.header{padding:28px 32px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.eyebrow{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.02em;}
.title span{color:var(--text2);font-weight:400;}
.meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.pill{display:flex;align-items:center;gap:6px;background:var(--tag-bg);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;}
.dot{width:6px;height:6px;border-radius:50%;}
.dr{background:var(--red);}.db{background:var(--blue);}
.stats{display:flex;gap:12px;padding:20px 32px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:100px;}
.snum{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;}
.snum.r{color:var(--red);}.snum.b{color:var(--blue);}.snum.o{color:var(--orange);}
.slabel{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.tabs{display:flex;padding:16px 32px 0;border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;font-family:'DM Sans',sans-serif;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom:2px solid var(--text);font-weight:600;}
.cnt{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:10px;margin-left:6px;font-family:'DM Mono',monospace;}
.cnt.r{background:var(--red-bg);color:var(--red);}
.cnt.b{background:var(--blue-bg);color:var(--blue);}
.content{padding:24px 32px;}
.panel{display:none;}.panel.active{display:block;}
.gong{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:10px;padding:16px 20px;margin-bottom:20px;}
.gong-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.gong-ttl{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.05em;}
.glink{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);text-decoration:none;margin-left:auto;}
.glink:hover{text-decoration:underline;}
.gi{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text);padding:2px 0;}
.ob{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap;}
.ou{background:var(--red-bg);color:var(--red);}
.oc{background:var(--blue-bg);color:var(--blue);}
.sh{display:flex;align-items:center;gap:10px;margin:20px 0 12px;}
.sl{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.sl.r{color:var(--red);}.sl.b{color:var(--blue);}.sl.j{color:var(--jira);}
.sc{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:99px;}
.sc.r{background:var(--red-bg);color:var(--red);}
.sc.b{background:var(--blue-bg);color:var(--blue);}
.sc.j{background:var(--blue-bg);color:var(--jira);}
.tw{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:var(--bg2);border-bottom:1px solid var(--border);}
th{padding:10px 14px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
td{padding:11px 14px;color:var(--text);vertical-align:top;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}
.tid{font-family:'DM Mono',monospace;font-size:12px;color:var(--blue);text-decoration:none;white-space:nowrap;}
.tid:hover{text-decoration:underline;}
.sb{font-size:11px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:4px;white-space:nowrap;display:inline-block;}
.su{background:var(--red-bg);color:var(--red);}
.scu{background:var(--blue-bg);color:var(--blue);}
.so{background:var(--orange-bg);color:var(--orange);}
.sp{background:var(--blue-bg);color:var(--blue);}
.pb{font-size:10px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px;white-space:nowrap;}
.p1{background:#fde8e8;color:#b91c1c;}
.p2{background:var(--orange-bg);color:var(--orange);}
.p3{background:var(--blue-bg);color:var(--blue);}
.jb{font-family:'DM Mono',monospace;font-size:11px;color:var(--jira);text-decoration:none;background:var(--blue-bg);padding:2px 7px;border-radius:4px;white-space:nowrap;}
.jb:hover{text-decoration:underline;}
.db2{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.db2.old{color:var(--red);}
.st{color:var(--text2);font-size:12px;line-height:1.5;max-width:280px;}
.opener{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:10px;padding:14px 18px;margin-top:20px;display:flex;gap:12px;}
.ol{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;margin-top:2px;}
.ot{font-size:13px;color:var(--text);font-style:italic;line-height:1.6;}
.risk{background:var(--red-bg);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:10px;padding:12px 16px;margin-top:12px;display:flex;gap:10px;align-items:center;}
.rl{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.rt{font-size:13px;color:var(--text);}
.note{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.no-calls{padding:40px 32px;text-align:center;color:var(--text3);font-family:'DM Mono',monospace;font-size:13px;}

</style>
</head>
<body>
<div class="header">
  <div>
    <div class="eyebrow">Testsigma · TAM Daily Brief</div>
    <div class="title">Osten Diniz <span>/ Monday, 14 Jul 2026</span></div>
    <div class="meta">
      <div class="pill"><span class="dot dr"></span>4 calls today</div>
      <div class="pill"><span class="dot dr"></span>4 on Us</div>
      <div class="pill"><span class="dot db"></span>1 on Customer</div>
    </div>
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="snum">5</div><div class="slabel">Total Open</div></div>
  <div class="stat"><div class="snum r">4</div><div class="slabel">On Us</div></div>
  <div class="stat"><div class="snum b">1</div><div class="slabel">On Customer</div></div>
  <div class="stat"><div class="snum o">4</div><div class="slabel">Calls Today</div></div>
  <div class="stat"><div class="snum r">32d</div><div class="slabel">Oldest Ticket</div></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>
<script>

const customers = [{"name": "Rain Stella", "onUs": 0, "onCustomer": 0, "gong": {"date": "2026-07-10", "link": "https://app.gong.io/call?id=1926741815268154969", "items": [{"text": "Next training session (reports, overview, end-to-end testing) already scheduled for next Monday", "owner": "US"}]}, "waitingOnUs": [], "waitingOnCustomer": [], "jiraTickets": [], "biggestRisk": "Training is in progress but go-live timeline is unclear due to server changes on the customer side. Ensure next Monday's session is confirmed and check if they're on track.", "opener": "Welcome back! How did the server release go? Are you on track for go-live, or do we need to adjust the timeline?"}, {"name": "Omnex Inc", "onUs": 0, "onCustomer": 0, "gong": null, "waitingOnUs": [], "waitingOnCustomer": [], "jiraTickets": [], "biggestRisk": "No Gong call history or Salesforce cases found. Relationship status unknown — use today's call to establish context and surface any blockers.", "opener": "Good to connect! Let's start with where your team stands — what brought you to today's call and what's your main testing challenge right now?"}, {"name": "State Farm", "onUs": 4, "onCustomer": 1, "gong": null, "waitingOnUs": [{"id": "00061373", "sfLink": "https://testsigma.lightning.force.com/lightning/o/Case/list", "subject": "Critical — oldest open ticket", "contact": "Surbhi Pamnani", "jira": null, "days": 32, "priority": "P1"}, {"id": "00062305", "sfLink": "https://testsigma.lightning.force.com/lightning/o/Case/list", "subject": "Import failed during execution", "contact": "manikandan Elumalai", "jira": "TP-5509", "days": 6, "priority": "P1"}, {"id": "00062386", "sfLink": "https://testsigma.lightning.force.com/lightning/o/Case/list", "subject": "Escalated to L2", "contact": "Salverio Ocoko", "jira": "TP-5271", "days": 5, "priority": "P1"}, {"id": "00062484", "sfLink": "https://testsigma.lightning.force.com/lightning/o/Case/list", "subject": "JSON error on test run", "contact": "Kiran Kumar S", "jira": null, "days": 1, "priority": "P1"}], "waitingOnCustomer": [{"id": "00062465", "sfLink": "https://testsigma.lightning.force.com/lightning/o/Case/list", "subject": "Test steps stuck — awaiting customer repro", "contact": "Jonathan Hamelau", "jira": null, "days": 1, "priority": "P1"}], "jiraTickets": [{"id": "TP-5509", "summary": "[Statefarm] Import are getting failed", "status": "Open", "assignee": "Engineering", "priority": "P1", "days": 4}, {"id": "CUS-13868", "summary": "[Statefarm] Import are getting failed", "status": "Waiting On Engineering", "assignee": "Engineering", "priority": "P1", "days": 4}, {"id": "TP-5271", "summary": "Copilot Extension Cannot Be Installed", "status": "Open", "assignee": "Engineering", "priority": "P1", "days": 14}], "biggestRisk": "Case 00061373 is 32 days old (P1) — critical escalation risk. Import failures (TP-5509) and Copilot extension install issue (TP-5271) are also open P1s. Three engineering tickets active simultaneously.", "opener": "Before we get into the agenda — I want to address the 32-day-old P1 case and the import failure your team flagged. Can we confirm the current status from your side?"}, {"name": "UCEAP", "onUs": 0, "onCustomer": 0, "gong": {"date": "2026-07-09", "link": "https://app.gong.io/call?id=1135188288032371783", "items": [{"text": "Osten to schedule dedicated Copilot gaps call with Fernando & Rama", "owner": "US"}, {"text": "Fernando to screen-record terminal glitch for engineering review", "owner": "CUSTOMER"}]}, "waitingOnUs": [], "waitingOnCustomer": [], "jiraTickets": [], "biggestRisk": "Terminal glitch is blocking Copilot adoption but cannot be reproduced without customer's screen recording. Engineering is stalled until Fernando provides the video.", "opener": "Fernando, did you get a chance to record that terminal glitch? Our engineering team is ready to investigate as soon as we have the recording."}];
function render(){
  const tabs=document.getElementById('tabs');
  const content=document.getElementById('content');
  if(!customers.length){
    content.innerHTML='<div class="no-calls">No customer calls scheduled for today.</div>';
    return;
  }
  customers.forEach((c,i)=>{
    const t=document.createElement('button');
    t.className='tab'+(i===0?' active':'');
    t.onclick=()=>sw(i);
    const tot=c.onUs+c.onCustomer;
    t.innerHTML=c.name+(tot>0?' <span class="cnt '+(c.onUs>0?'r':'b')+'">'+tot+'</span>':'');
    tabs.appendChild(t);
    const p=document.createElement('div');
    p.className='panel'+(i===0?' active':'');
    p.id='p'+i;
    p.innerHTML=buildPanel(c);
    content.appendChild(p);
  });
}
function sw(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',i===j));
}
function buildPanel(c){
  let h='';
  if(c.gong){
    h+=`<div class="gong"><div class="gong-hdr">
    <div class="gong-ttl">&#128222; Gong &mdash; Pending &middot; ${c.gong.date}</div>
    <a class="glink" href="${c.gong.link}" target="_blank">&#128279; View recording &rarr;</a>
    </div>${c.gong.items.map(i=>`<div class="gi">&bull; ${i.text}
    <span class="ob ${i.owner==='US'?'ou':'oc'}">${i.owner}</span>
    </div>`).join('')}</div>`;
  }
  if(c.waitingOnUs&&c.waitingOnUs.length){
    h+=`<div class="sh"><div class="sl r">&#128308; Waiting on Us</div>
    <div class="sc r">${c.waitingOnUs.length} case${c.waitingOnUs.length>1?'s':''}</div></div>
    <div class="tw"><table><thead><tr>
    <th>Ticket ID</th><th>Subject</th><th>Contact</th>
    <th>Linked Jira</th><th>Days Open</th><th>Priority</th><th>Status</th></tr></thead><tbody>
    ${c.waitingOnUs.map(t=>`<tr>
    <td><a class="tid" href="${t.sfLink}" target="_blank">${t.id}</a></td>
    <td><div class="st">${t.subject||'&mdash;'}</div></td>
    <td style="font-size:12px;white-space:nowrap;">${t.contact||'&mdash;'}</td>
    <td>${t.jira?`<a class="jb" href="https://testsigma.atlassian.net/browse/${t.jira}" target="_blank">${t.jira}</a>`:'&mdash;'}</td>
    <td><span class="db2${t.days>30?' old':''}">${t.days}d</span></td>
    <td><span class="pb p${t.priority.slice(1)}">${t.priority}</span></td>
    <td><span class="sb su">On Us</span></td>
    </tr>`).join('')}
    </tbody></table></div>`;
  }
  if(c.waitingOnCustomer&&c.waitingOnCustomer.length){
    h+=`<div class="sh"><div class="sl b">&#128309; Waiting on Customer</div>
    <div class="sc b">${c.waitingOnCustomer.length} case${c.waitingOnCustomer.length>1?'s':''}</div></div>
    <div class="tw"><table><thead><tr>
    <th>Ticket ID</th><th>Subject</th><th>Contact</th>
    <th>Linked Jira</th><th>Days Open</th><th>Priority</th><th>Status</th></tr></thead><tbody>
    ${c.waitingOnCustomer.map(t=>`<tr>
    <td><a class="tid" href="${t.sfLink}" target="_blank">${t.id}</a></td>
    <td><div class="st">${t.subject||'&mdash;'}</div></td>
    <td style="font-size:12px;white-space:nowrap;">${t.contact||'&mdash;'}</td>
    <td>${t.jira?`<a class="jb" href="https://testsigma.atlassian.net/browse/${t.jira}" target="_blank">${t.jira}</a>`:'&mdash;'}</td>
    <td><span class="db2${t.days>30?' old':''}">${t.days}d</span></td>
    <td><span class="pb p${t.priority.slice(1)}">${t.priority}</span></td>
    <td><span class="sb scu">On Customer</span></td>
    </tr>`).join('')}
    </tbody></table></div>`;
  }
  if(c.jiraTickets&&c.jiraTickets.length){
    h+=`<div class="sh"><div class="sl j">&#127914; Jira Tickets</div>
    <div class="sc j">${c.jiraTickets.length} ticket${c.jiraTickets.length>1?'s':''}</div></div>
    <div class="tw"><table><thead><tr>
    <th>Ticket ID</th><th>Summary</th><th>Status</th>
    <th>Assignee</th><th>Priority</th><th>Days Open</th></tr></thead><tbody>
    ${c.jiraTickets.map(t=>`<tr>
    <td><a class="tid" href="https://testsigma.atlassian.net/browse/${t.id}" target="_blank">${t.id}</a></td>
    <td><div class="st">${t.summary}</div></td>
    <td><span class="sb sp">${t.status}</span></td>
    <td style="font-size:12px;">${t.assignee||'&mdash;'}</td>
    <td><span class="pb p${t.priority.slice(1)}">${t.priority}</span></td>
    <td><span class="db2${t.days>30?' old':''}">${t.days}d</span></td>
    </tr>`).join('')}
    </tbody></table></div>`;
  }
  if(!c.waitingOnUs?.length && !c.waitingOnCustomer?.length && !c.jiraTickets?.length && !c.gong){
    h+=`<div style="padding:24px 0;color:var(--text3);font-family:'DM Mono',monospace;font-size:12px;">No open Salesforce cases or Gong action items found in the last 60 days.</div>`;
  }
  h+=`<div class="risk"><div class="rl">&#128680; Biggest Risk</div>
  <div class="rt">${c.biggestRisk}</div></div>
  <div class="opener"><div class="ol">&#128483;&#65039; Open with</div>
  <div class="ot">"${c.opener}"</div></div>
  <div class="note">&#128204; If any customer call is missing, ensure the calendar event has "Tenant ID: XXXXX" in the description or the customer company name in the title.</div>`;
  return h;
}
render();

</script>
</body>
</html>
