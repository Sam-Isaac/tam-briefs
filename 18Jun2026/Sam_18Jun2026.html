<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sam Isaac — TAM Brief · 18 Jun 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --text: #e8e8f0;
      --text-muted: #888899;
      --accent: #7c6af7;
      --accent-dim: rgba(124,106,247,0.15);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.12);
      --green: #22c55e;
      --orange: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: -0.01em; }
    .sep { color: var(--border); font-size: 18px; }
    .tam-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 600; }
    .header-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); }
    .main { max-width: 1060px; margin: 0 auto; padding: 28px 32px; }
    .no-calls { text-align: center; padding: 80px 32px; color: var(--text-muted); }
    .no-calls-icon { font-size: 48px; margin-bottom: 16px; }
    .no-calls h2 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text); margin-bottom: 6px; }
    .no-calls p { font-size: 14px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
    .tab-badge { background: var(--red); color: white; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 9px; font-family: 'DM Mono', monospace; }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px) } to { opacity:1; transform:translateY(0) } }
    .section-header { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px; }
    .call-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 8px; }
    .call-header { display: flex; align-items: center; gap: 12px; }
    .call-icon { width: 34px; height: 34px; background: var(--accent-dim); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .call-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; }
    .call-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .gong-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--orange); border-radius: 10px; padding: 14px 18px; margin: 16px 0; }
    .gong-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 0.08em; text-transform: uppercase; }
    .gong-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }
    .action-item { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .action-item:last-child { border-bottom: none; padding-bottom: 0; }
    .action-owner { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 600; padding: 2px 5px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; letter-spacing: 0.04em; }
    .action-owner.us { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(124,106,247,0.4); }
    .action-owner.customer { background: rgba(249,115,22,0.12); color: var(--orange); border: 1px solid rgba(249,115,22,0.4); }
    .bucket-header { padding: 9px 14px; border-radius: 6px 6px 0 0; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.05em; }
    .bucket-red { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.35); border-bottom: none; color: var(--red); margin-top: 16px; }
    .bucket-blue { background: var(--blue-dim); border: 1px solid rgba(59,130,246,0.35); border-bottom: none; color: var(--blue); margin-top: 16px; }
    .cases-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .red-bucket { border: 1px solid rgba(239,68,68,0.35); border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
    .blue-bucket { border: 1px solid rgba(59,130,246,0.35); border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; }
    .cases-table thead { background: var(--surface2); }
    .cases-table th { padding: 7px 10px; text-align: left; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
    .cases-table tbody tr { border-top: 1px solid var(--border); background: var(--surface); }
    .cases-table tbody tr:hover { background: var(--surface2); }
    .cases-table td { padding: 9px 10px; vertical-align: middle; }
    .case-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); white-space: nowrap; }
    .case-subject { font-size: 13px; max-width: 300px; line-height: 1.4; }
    .priority-badge { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
    .p1 { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .p2 { background: rgba(249,115,22,0.15); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
    .p3 { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
    .days-badge { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .status-badge { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
    .jira-link { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); text-decoration: none; padding: 2px 6px; border-radius: 3px; border: 1px solid var(--accent-dim); background: var(--accent-dim); white-space: nowrap; }
    .jira-link:hover { border-color: var(--accent); }
    .no-cases { text-align: center; padding: 28px; color: var(--text-muted); font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-top: 16px; }
    @media (max-width: 700px) {
      .main { padding: 16px; }
      .header { padding: 14px 16px; }
      .case-subject { max-width: 160px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="logo">Testsigma TAM</span>
      <span class="sep">/</span>
      <span class="tam-name">Sam Isaac</span>
    </div>
    <span class="header-date">📅 18 Jun 2026 · Thursday</span>
  </div>
  <div class="main">
    
    <div class="tabs"><button class="tab active" onclick="showPanel('qualitykiosk-sam')">Quality Kiosk</button></div>
    
        <div class="panel active" id="panel-qualitykiosk-sam">
          <div class="section-header">Today's Call</div>
          
            <div class="call-card">
              <div class="call-header">
                <div class="call-icon">📞</div>
                <div class="call-info">
                  <div class="call-title">Quality Kiosk — Account Check-in</div>
                  <div class="call-meta">Today, 18 Jun 2026</div>
                </div>
              </div>
            </div>
          
          <div class="no-cases">✓ No open support cases</div>
        </div>
  </div>
  <script>
    function showPanel(id) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      const panel = document.getElementById('panel-' + id);
      if (panel) panel.classList.add('active');
      event.currentTarget.classList.add('active');
    }
  </script>
</body>
</html>
