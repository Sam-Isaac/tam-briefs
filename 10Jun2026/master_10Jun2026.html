<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TAM Team Overview · 10 Jun 2026</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--border:#dfe1e6;--text:#172b4d;--text2:#5e6c84;--accent:#0052cc;--red:#de350b;--blue:#0065ff;--badge:#dfe1e6;--badge-text:#5e6c84;--old-bg:#ffebe6;--old-text:#bf2600;--tab-bg:#ebecf0;--gong-bg:#fffae6;--gong-bdr:#f6c000;--green:#00875a}
@media(prefers-color-scheme:dark){:root{--bg:#1a1d27;--card:#23273a;--border:#353b50;--text:#cdd3e0;--text2:#7b849a;--accent:#4c9aff;--red:#ff5630;--blue:#4c9aff;--badge:#353b50;--badge-text:#7b849a;--old-bg:#3b1a0f;--old-text:#ff7452;--tab-bg:#2c3047;--gong-bg:#2a2514;--gong-bdr:#c9a000;--green:#57d9a3}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.page{max-width:1000px;margin:0 auto;padding:24px 16px}
header{margin-bottom:24px;border-bottom:2px solid var(--border);padding-bottom:16px}
header h1{font-size:22px;font-weight:700}
header p{color:var(--text2);font-size:13px;margin-top:3px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.tam-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tam-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tam-name{font-size:15px;font-weight:700}
.tam-link{font-size:12px;color:var(--accent);text-decoration:none;font-weight:500}
.tam-link:hover{text-decoration:underline}
.tam-body{padding:12px 16px}
.no-calls-row{color:var(--text2);font-size:13px;font-style:italic;padding:6px 0}
.call-row{margin-bottom:10px}
.call-name{font-size:13px;font-weight:600;margin-bottom:4px}
.call-time{font-size:11px;color:var(--text2);margin-bottom:5px}
.counts{display:flex;gap:6px;flex-wrap:wrap}
.cnt{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;padding:2px 8px;border-radius:12px}
.cnt.red{background:var(--old-bg);color:var(--red)}
.cnt.blue{background:#e6f0ff;color:var(--blue)}
.cnt.none{background:var(--badge);color:var(--badge-text)}
@media(prefers-color-scheme:dark){.cnt.blue{background:#1a2e4a;color:#4c9aff}}
.gong-pill{display:inline-block;font-size:11px;background:var(--gong-bg);border:1px solid var(--gong-bdr);color:#7a5800;border-radius:10px;padding:1px 7px;margin-top:4px;font-weight:500}
@media(prefers-color-scheme:dark){.gong-pill{color:#ffc400}}
.summary-bar{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 18px}
.stat{display:flex;flex-direction:column}
.stat-val{font-size:20px;font-weight:700}
.stat-val.red{color:var(--red)}.stat-val.blue{color:var(--blue)}.stat-val.accent{color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}
</style>
</head>
<body>
<div class="page">
<header>
  <h1>TAM Team Overview</h1>
  <p>Wednesday, 10 Jun 2026 · 8 TAMs · Customer Success</p>
</header>

<div class="summary-bar">
  <div class="stat"><span class="stat-val accent">6</span><span class="stat-lbl">TAMs with calls</span></div>
  <div class="stat"><span class="stat-val">8</span><span class="stat-lbl">Customer calls today</span></div>
  <div class="stat"><span class="stat-val red">25</span><span class="stat-lbl">🔴 Waiting on Us</span></div>
  <div class="stat"><span class="stat-val blue">8</span><span class="stat-lbl">🔵 Waiting on Customer</span></div>
  <div class="stat"><span class="stat-val">2</span><span class="stat-lbl">🎯 Gong follow-ups</span></div>
</div>

<div class="grid" id="grid"></div>
</div>
<script>
const BASE="https://sam-isaac.github.io/tam-briefs/10Jun2026/";
const TAMS=[
{
  name:"Sam Isaac",file:"Sam_10Jun2026.html",
  calls:[
    {customer:"DHL TaaS",time:"12:30 PM",red:7,blue:2,gong:true},
    {customer:"State Farm",time:"7:30 PM",red:2,blue:1,gong:false}
  ]
},
{
  name:"Mohan Kumar N",file:"Mohan_10Jun2026.html",
  calls:[
    {customer:"Bounteous",time:"3:30 PM",red:3,blue:1,gong:true}
  ]
},
{
  name:"Shivani Sharma",file:"Shivani_10Jun2026.html",
  calls:[]
},
{
  name:"Osten Diniz",file:"Osten_10Jun2026.html",
  calls:[
    {customer:"MPower",time:"4:00 PM",red:0,blue:0,gong:false},
    {customer:"State Farm",time:"7:30 PM",red:2,blue:1,gong:false}
  ]
},
{
  name:"Arthy Mohanraj",file:"Arthy_10Jun2026.html",
  calls:[
    {customer:"Guidepoint Security",time:"10:00 PM",red:4,blue:2,gong:false}
  ]
},
{
  name:"Pritish Samal",file:"Pritish_10Jun2026.html",
  calls:[
    {customer:"NTT Data",time:"3:30 PM",red:0,blue:1,gong:false},
    {customer:"State Farm",time:"7:30 PM",red:2,blue:1,gong:false}
  ]
},
{
  name:"Sandeep Sai K",file:"Sandeep_10Jun2026.html",
  calls:[
    {customer:"DHL TaaS",time:"12:30 PM",red:7,blue:2,gong:true},
    {customer:"DHL Chennai",time:"2:00 PM",red:0,blue:0,gong:false}
  ]
},
{
  name:"Nixon Nicholas",file:"Nixon_10Jun2026.html",
  calls:[]
}
];

const grid=document.getElementById('grid');
TAMS.forEach(t=>{
  const card=document.createElement('div');
  card.className='tam-card';

  let body='';
  if(!t.calls.length){
    body='<div class="no-calls-row">No customer calls today</div>';
  } else {
    t.calls.forEach(c=>{
      body+=`<div class="call-row">
        <div class="call-name">${c.customer}</div>
        <div class="call-time">🕐 ${c.time}</div>
        <div class="counts">`;
      if(c.red>0) body+=`<span class="cnt red">🔴 ${c.red} on us</span>`;
      if(c.blue>0) body+=`<span class="cnt blue">🔵 ${c.blue} on cust</span>`;
      if(c.red===0&&c.blue===0) body+=`<span class="cnt none">No cases</span>`;
      body+=`</div>`;
      if(c.gong) body+=`<span class="gong-pill">🎯 Gong actions pending</span>`;
      body+=`</div>`;
    });
  }

  card.innerHTML=`
    <div class="tam-hdr">
      <span class="tam-name">${t.name}</span>
      <a class="tam-link" href="${BASE}${t.file}" target="_blank">View Brief →</a>
    </div>
    <div class="tam-body">${body}</div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
