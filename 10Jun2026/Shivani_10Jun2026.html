<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shivani Sharma – TAM Brief · 10 Jun 2026</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--border:#dfe1e6;--text:#172b4d;--text2:#5e6c84;--accent:#0052cc}
@media(prefers-color-scheme:dark){:root{--bg:#1a1d27;--card:#23273a;--border:#353b50;--text:#cdd3e0;--text2:#7b849a;--accent:#4c9aff}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.page{max-width:860px;margin:0 auto;padding:24px 16px}
header{margin-bottom:20px}
header h1{font-size:22px;font-weight:700}
header p{color:var(--text2);font-size:13px;margin-top:3px}
.no-calls{text-align:center;padding:60px 20px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.no-calls .icon{font-size:36px;margin-bottom:10px}
.no-calls h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.no-calls p{color:var(--text2);font-size:13px}
</style>
</head>
<body>
<div class="page">
<header>
  <h1>Shivani Sharma – TAM Brief</h1>
  <p>Wednesday, 10 Jun 2026 · Technical Account Manager</p>
</header>
<div class="no-calls">
  <div class="icon">📅</div>
  <h2>No customer calls scheduled today</h2>
  <p>No calls found on your calendar for 10 Jun 2026.</p>
</div>
</div>
</body>
</html>
