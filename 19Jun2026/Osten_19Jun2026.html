<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osten Diniz · TAM Brief · 19 Jun 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Syne:wght@400..800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f9fb;--surface:#fff;--border:#e2e6ea;--text:#1a1d23;--muted:#6b7280;--accent:#4f46e5;--red:#ef4444;--blue:#3b82f6;--yellow:#f59e0b;--p1-bg:#fef2f2;--p1-text:#dc2626;--p2-bg:#fff7ed;--p2-text:#d97706;--p3-bg:#f0fdf4;--p3-text:#16a34a;--su-bg:#fef2f2;--su-text:#dc2626;--scu-bg:#eff6ff;--scu-text:#1d4ed8}
[data-theme=dark]{--bg:#0f1117;--surface:#1a1d23;--border:#2d3139;--text:#e8eaf0;--muted:#9ca3af;--accent:#818cf8;--red:#f87171;--blue:#60a5fa;--yellow:#fbbf24;--p1-bg:#2d1b1b;--p1-text:#f87171;--p2-bg:#2d2310;--p2-text:#fbbf24;--p3-bg:#0f2a1f;--p3-text:#34d399;--su-bg:#2d1b1b;--su-text:#f87171;--scu-bg:#1b2340;--scu-text:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.hdr p{font-size:13px;color:var(--muted);margin-top:3px}
.theme-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif}
.stats{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.stat{flex:1;padding:14px 20px;border-right:1px solid var(--border);text-align:center}
.stat:last-child{border-right:none}
.stat-n{font-family:'DM Mono',monospace;font-size:26px;font-weight:500}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.red{color:var(--red)}.blue{color:var(--blue)}
.main{padding:24px 32px;max-width:1100px;margin:0 auto}
.no-calls{text-align:center;padding:60px 32px;color:var(--muted)}
.no-calls h2{font-family:'Syne',sans-serif;font-size:20px;margin-bottom:8px;color:var(--text)}
footer{text-align:center;padding:20px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <h1>Osten Diniz · TAM Brief</h1>
    <p>Friday, 19 June 2026 · Technical Account Manager</p>
  </div>
  <button class="theme-btn" onclick="document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'">☀ / 🌙</button>
</div>
<div class="stats">
  <div class="stat"><div class="stat-n">0</div><div class="stat-l">Total Open Cases</div></div>
  <div class="stat"><div class="stat-n red">0</div><div class="stat-l">Waiting on Us</div></div>
  <div class="stat"><div class="stat-n blue">0</div><div class="stat-l">Waiting on Customer</div></div>
  <div class="stat"><div class="stat-n">0d</div><div class="stat-l">Oldest Case</div></div>
  <div class="stat"><div class="stat-n">0</div><div class="stat-l">Calls Today</div></div>
</div>
<div class="main">
  <div class="no-calls">
    <h2>No Customer Calls Today</h2>
    <p>No customer meetings scheduled for Friday, 19 June 2026.</p>
  </div>
</div>
<footer>Generated by TAM Brief Automation · 19 Jun 2026</footer>
<script>
const CUSTOMERS_JSON_ARRAY = [];
</script>
</body>
</html>
