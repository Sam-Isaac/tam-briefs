<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAM Team Overview — 16 Jul 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#f5f4f0;--bg2:#eceae4;--bg3:#ffffff;--border:#ddd9d0;
--text:#1a1916;--text2:#6b6860;--text3:#9b9890;--red:#c94040;
--red-bg:#fdf0f0;--blue:#2563eb;--blue-bg:#eff4ff;--green:#16a34a;
--green-bg:#f0fdf4;--orange:#d97706;--orange-bg:#fffbeb;
--jira:#0052cc;--tag-bg:#e8e6e0;}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--bg2:#1a1917;
--bg3:#222220;--border:#2e2d2a;--text:#f0ede8;--text2:#8a8880;
--text3:#5a5855;--red:#ef5555;--red-bg:#1f1212;--blue:#60a5fa;
--blue-bg:#111827;--green:#4ade80;--green-bg:#0f1f14;--orange:#fbbf24;
--orange-bg:#1c1608;--jira:#4d9de0;--tag-bg:#2a2926;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);
color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
.header{padding:28px 32px 20px;border-bottom:1px solid var(--border);}
.eyebrow{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);
letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;
letter-spacing:-.02em;}
.title span{color:var(--text2);font-weight:400;}
.totals{display:flex;gap:12px;padding:20px 32px;
border-bottom:1px solid var(--border);flex-wrap:wrap;}
.tot{background:var(--bg3);border:1px solid var(--border);
border-radius:10px;padding:14px 20px;flex:1;min-width:110px;}
.tnum{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;
line-height:1;margin-bottom:4px;}
.tnum.r{color:var(--red);}.tnum.b{color:var(--blue);}.tnum.o{color:var(--orange);}
.tlabel{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;
text-transform:uppercase;letter-spacing:.06em;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:20px;padding:24px 32px;}
.card{background:var(--bg3);border:1px solid var(--border);
border-radius:14px;overflow:hidden;}
.card-hdr{display:flex;align-items:center;gap:14px;padding:18px 20px;
border-bottom:1px solid var(--border);}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;
align-items:center;justify-content:center;font-family:'Syne',sans-serif;
font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.card-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.card-calls{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.card-link{margin-left:auto;font-size:11px;font-family:'DM Mono',monospace;
color:var(--blue);text-decoration:none;white-space:nowrap;}
.card-link:hover{text-decoration:underline;}
.card-stats{display:flex;gap:0;border-bottom:1px solid var(--border);}
.cs{flex:1;padding:10px 16px;text-align:center;border-right:1px solid var(--border);}
.cs:last-child{border-right:none;}
.csn{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1;}
.csn.r{color:var(--red);}.csn.b{color:var(--blue);}
.csl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;
text-transform:uppercase;letter-spacing:.05em;margin-top:3px;}
.card-body{padding:14px 20px;}
.call-row{display:flex;align-items:center;gap:8px;padding:5px 0;
border-bottom:1px solid var(--border);font-size:13px;}
.call-row:last-child{border-bottom:none;}
.call-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);
white-space:nowrap;min-width:50px;}
.call-co{font-weight:500;color:var(--text);}
.call-cnt{font-size:10px;font-family:'DM Mono',monospace;padding:1px 6px;
border-radius:99px;}
.call-cnt.r{background:var(--red-bg);color:var(--red);}
.call-cnt.b{background:var(--blue-bg);color:var(--blue);}
.call-cnt.g{background:var(--green-bg);color:var(--green);}
.risk-row{margin-top:10px;padding:8px 12px;background:var(--red-bg);
border-radius:8px;font-size:12px;color:var(--text);display:flex;gap:8px;
align-items:flex-start;}
.risk-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);
text-transform:uppercase;white-space:nowrap;padding-top:1px;}
.no-calls{padding:14px 20px;font-size:12px;color:var(--text3);
font-family:'DM Mono',monospace;text-align:center;}
</style>
</head>
<body>
<div class="header">
  <div class="eyebrow">Testsigma · TAM Team Overview</div>
  <div class="title">Team Brief <span>/ Wednesday, 16 Jul 2026</span></div>
</div>
<div class="totals">
  <div class="tot"><div class="tnum">8</div><div class="tlabel">TAMs Active</div></div>
  <div class="tot"><div class="tnum o">11</div><div class="tlabel">Calls Today</div></div>
  <div class="tot"><div class="tnum">14</div><div class="tlabel">Total Open</div></div>
  <div class="tot"><div class="tnum r">10</div><div class="tlabel">On Us</div></div>
  <div class="tot"><div class="tnum b">4</div><div class="tlabel">On Customer</div></div>
  <div class="tot"><div class="tnum r">9d</div><div class="tlabel">Oldest Ticket</div></div>
</div>
<div class="grid" id="grid"></div>
<script>
const BASE = "https://sam-isaac.github.io/tam-briefs/16Jul2026";
const tams = [
  {
    name: "Sam Isaac", initials: "SI", color: "#7c3aed",
    file: "Sam_16Jul2026.html",
    total: 0, onUs: 0, onCustomer: 0, calls: 2,
    callList: [
      {time: "14:00", company: "Brownbox", count: 0},
      {time: "22:30", company: "UCEAP", count: 0}
    ],
    biggestRisk: "No open cases. Copilot gap discussion for UCEAP not yet scheduled."
  },
  {
    name: "Mohan Kumar N", initials: "MK", color: "#059669",
    file: "Mohan_16Jul2026.html",
    total: 1, onUs: 1, onCustomer: 0, calls: 2,
    callList: [
      {time: "12:30", company: "Space42", count: 1},
      {time: "14:00", company: "Astrolabs", count: 0}
    ],
    biggestRisk: "00062527 (P1, 2d) — On-prem terminal login redirect blocks Space42 execution."
  },
  {
    name: "Shivani Sharma", initials: "SS", color: "#db2777",
    file: "Shivani_16Jul2026.html",
    total: 0, onUs: 0, onCustomer: 0, calls: 1,
    callList: [
      {time: "14:00", company: "Brownbox", count: 0}
    ],
    biggestRisk: "No open cases. Ensure Brownbox test case creation momentum is maintained."
  },
  {
    name: "Osten Diniz", initials: "OD", color: "#0891b2",
    file: "Osten_16Jul2026.html",
    total: 0, onUs: 0, onCustomer: 0, calls: 2,
    callList: [
      {time: "15:00", company: "Omnex Inc", count: 0},
      {time: "22:30", company: "UCEAP", count: 0}
    ],
    biggestRisk: "No open cases. No Gong data for Omnex — limited account health visibility."
  },
  {
    name: "Arthy Mohanraj", initials: "AM", color: "#d97706",
    file: "Arthy_16Jul2026.html",
    total: 0, onUs: 0, onCustomer: 0, calls: 1,
    callList: [
      {time: "15:00", company: "PTSG", count: 0}
    ],
    biggestRisk: "Synchronization workaround follow-up email to PTSG still pending from us."
  },
  {
    name: "Pritish Samal", initials: "PS", color: "#c94040",
    file: "Pritish_16Jul2026.html",
    total: 5, onUs: 5, onCustomer: 0, calls: 2,
    callList: [
      {time: "05:00", company: "StateFarm", count: 5},
      {time: "22:30", company: "UCEAP", count: 0}
    ],
    biggestRisk: "00062305 (P1, 8d) — Import failed unresolved for 8 days. High escalation risk at StateFarm."
  },
  {
    name: "Sandeep Sai K", initials: "SK", color: "#6b7280",
    file: "Sandeep_16Jul2026.html",
    total: 0, onUs: 0, onCustomer: 0, calls: 0,
    callList: [],
    biggestRisk: "No customer calls today."
  },
  {
    name: "Nixon Nicholas", initials: "NN", color: "#1d4ed8",
    file: "Nixon_16Jul2026.html",
    total: 8, onUs: 4, onCustomer: 4, calls: 1,
    callList: [
      {time: "15:00", company: "Nuvama Wealth", count: 8}
    ],
    biggestRisk: "00062249 (P2, 9d) — Test cases failing consecutively, 8 total open cases. Nuvama account health at risk."
  }
];
const grid = document.getElementById('grid');
tams.forEach(t => {
  const card = document.createElement('div');
  card.className = 'card';
  const totalOpen = t.onUs + t.onCustomer;
  let callsHtml = '';
  if(t.callList.length) {
    callsHtml = t.callList.map(c => {
      const cls = c.count > 0 ? 'r' : 'g';
      const lbl = c.count > 0 ? c.count + ' open' : 'clean';
      return `<div class="call-row">
        <span class="call-time">${c.time}</span>
        <span class="call-co">${c.company}</span>
        <span class="call-cnt ${cls}">${lbl}</span>
      </div>`;
    }).join('');
  } else {
    callsHtml = '<div class="no-calls">No customer calls today</div>';
  }
  card.innerHTML = `
    <div class="card-hdr">
      <div class="avatar" style="background:${t.color}">${t.initials}</div>
      <div>
        <div class="card-name">${t.name}</div>
        <div class="card-calls">${t.calls} call${t.calls !== 1 ? 's' : ''} today</div>
      </div>
      <a class="card-link" href="${BASE}/${t.file}" target="_blank">View Brief →</a>
    </div>
    <div class="card-stats">
      <div class="cs"><div class="csn">${t.total}</div><div class="csl">Total Open</div></div>
      <div class="cs"><div class="csn r">${t.onUs}</div><div class="csl">On Us</div></div>
      <div class="cs"><div class="csn b">${t.onCustomer}</div><div class="csl">On Customer</div></div>
    </div>
    <div class="card-body">
      ${callsHtml}
      <div class="risk-row"><span class="risk-lbl">⚠ Risk</span><span>${t.biggestRisk}</span></div>
    </div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
